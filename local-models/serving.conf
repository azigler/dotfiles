# serving.conf — per-model serving registry for the round-2 bench harness.
#
# Read by local-models/bench-matrix.sh (server lifecycle per cohort) and
# claude/sandbox/run-scenario.sh (Claude-Code-native invocation env).
# This file is the single source of truth for the candidate roster AND
# how each candidate is served. Bead: dotfiles-6go (spec
# local-coding-models-517; probe evidence refs/eval-round-2-manifest.md
# in ~/explore/local-coding-models).
#
# Format (pipe-delimited, 6 fields; comments + blank lines ignored):
#
#   model|server|base_url|launch|stop|blob
#
#   model    Candidate identifier. This exact string is used as:
#            - CC's --model / ANTHROPIC_MODEL / ANTHROPIC_DEFAULT_HAIKU_MODEL
#              / CLAUDE_CODE_SUBAGENT_MODEL value
#            - the model name the serving layer must echo back (routing
#              verification asserts response.model / CC modelUsage == this)
#            - the result-filename cohort key (passed to analyze-variance
#              --cohort). For ollama entries it must therefore be the exact
#              ollama tag; for llama-server entries the launch command pins
#              it via `-a <model>` (alias).
#   server   One of: llama-server | ollama | anthropic.
#            llama-server = the Ollama-bundled llama.cpp server binary
#              (/Users/pico/ollama-0.30.7/llama-server) run with --jinja.
#              Native Anthropic /v1/messages + grammar-constrained tool
#              calls — the grammar rescues qwen3 from the <system-reminder>
#              XML-prose priming failure (bead 11e / ck0).
#              POLICY (amended 2026-06-11, canary catch): each model is
#              served on its CC-shape-VERIFIED path, not by blanket
#              default. llama-server additionally requires the blob's
#              /props chat_template to be a real Jinja body — Ollama
#              GGUFs may carry only a preset NAME (devstral:
#              "mistral-v7-tekken"), which --jinja renders as a constant
#              and silently destroys the prompt.
#            ollama = Ollama 0.30.7 OFFICIAL tarball binary
#              (/Users/pico/ollama-0.30.7/ollama — the brew bottle is BROKEN,
#              ships no llama-server runner). Used ONLY for MLX-engine-only
#              models (laguna-xs.2) — and it remains the model store/puller.
#            anthropic = real Anthropic API baseline (no local serving).
#   base_url ANTHROPIC_BASE_URL for CC. Empty for anthropic entries.
#   launch   Full remote command bench-matrix runs on pico via ssh to start
#            the server (nohup ... & disown included). MUST use absolute
#            binary paths — /opt/homebrew/bin is NOT in the ssh PATH.
#            MUST NOT contain the `|` character (field separator).
#            Empty for anthropic entries.
#   stop     pkill -f PATTERN handed to safe_pkill_remote (kill + verify
#            absence + retry — lib/safe_remote.sh). Empty for anthropic.
#   blob     For llama-server entries: absolute path of the GGUF blob in
#            Ollama's store. Pre-flight asserts it exists on pico (ABORT if
#            missing). For ollama entries: the manifest path that proves the
#            tag is pulled. Empty for anthropic.
#
#   Resolve a blob path for a newly pulled tag (run on pico):
#     python3 -c 'import json;d=json.load(open("/Users/pico/.ollama/models/manifests/registry.ollama.ai/library/<name>/<tag>"));print([l["digest"] for l in d["layers"] if l["mediaType"].endswith("model")][0])'
#   then blob = /Users/pico/.ollama/models/blobs/<digest with : -> ->
#
# Entry ORDER = default cohort order (lightest-first, OQ-04 discipline).
# Only entries whose weights are verified-present on pico are active;
# the rest of the locked round-2 roster (spec 517) is listed commented-out
# with pull notes — uncomment after pulling + resolving the blob/manifest.

# --- ACTIVE (weights verified on pico 2026-06-10) ---

# Devstral-Small-2-24B-2512 (Apache-2.0, 15.2 GB GGUF). CC-immune to the
# <system-reminder> priming (11e bisect: passes CC's exact body).
# SERVED VIA OLLAMA NATIVE — the llama-server path is BROKEN for this
# blob: its GGUF chat_template metadata is the literal preset NAME
# "mistral-v7-tekken" (Ollama keeps the real template in its manifest);
# llama-server --jinja renders the name as a constant → prompt collapses
# to ~8 tokens → model free-associates (canary catch 2026-06-11, bead
# local-coding-models-usk). POLICY AMENDED: a model is served on its
# CC-shape-VERIFIED path only; before activating any llama-server entry,
# /props chat_template must be a real Jinja body, not a preset name.
devstral-small-2|ollama|http://100.72.47.4:11434|cd /Users/pico && nohup env OLLAMA_HOST=100.72.47.4:11434 OLLAMA_FLASH_ATTENTION=1 OLLAMA_KV_CACHE_TYPE=q8_0 OLLAMA_KEEP_ALIVE=24h OLLAMA_CONTEXT_LENGTH=131072 OLLAMA_NUM_PARALLEL=1 OLLAMA_MAX_LOADED_MODELS=1 /Users/pico/ollama-0.30.7/ollama serve >> /tmp/ollama-bench.log 2>&1 & disown|ollama serve|/Users/pico/.ollama/models/manifests/registry.ollama.ai/library/devstral-small-2/latest

# Qwen3-Coder-30B-A3B (Apache-2.0, 18.6 GB GGUF) — re-baseline + positive
# control. MUST be llama-server: on Ollama's own parser the CC request
# shape derails it into <function=...> text (11e); the lazy grammar on
# llama-server constrains it back into the parseable envelope (ck0).
qwen3-coder:30b|llama-server|http://100.72.47.4:8082|nohup /Users/pico/ollama-0.30.7/llama-server --jinja -m /Users/pico/.ollama/models/blobs/sha256-1194192cf2a187eb02722edcc3f77b11d21f537048ce04b67ccf8ba78863006a -c 32768 --host 100.72.47.4 --port 8082 -a qwen3-coder:30b >> /tmp/llama-server-bench.log 2>&1 & disown|llama-server|/Users/pico/.ollama/models/blobs/sha256-1194192cf2a187eb02722edcc3f77b11d21f537048ce04b67ccf8ba78863006a

# Anthropic Opus baseline — dispatched only via explicit --candidates opus.
opus|anthropic||||

