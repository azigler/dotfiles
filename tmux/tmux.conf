set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-features ",alacritty*:RGB"

# LaunchAgent-started tmux inherits a minimal PATH (no /opt/homebrew/bin), which
# breaks 'run' directives whose scripts shell out to `tmux` (catppuccin, tpm).
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

set -g @continuum-boot "on"
set -g @continuum-restore "on"

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-pain-control"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "tmux-plugins/tmux-logging"
set -g @plugin "catppuccin/tmux"

run "$HOME/.tmux/plugins/tmux/catppuccin.tmux"
set -g @catppuccin_window_text " #{window_name}"
set -g @catppuccin_window_current_text " #{window_name}"

set -g @catppuccin_flavour "macchiato"
set -g @catppuccin_window_status_style "rounded"

set -g status-left ""
set -g status-right ""

run "$HOME/.tmux/plugins/tpm/tpm"
